# =============================================================================
# Verified UniProt accession <-> NCBI Gene ID crosswalk
# =============================================================================
# Source: UniProtKB/Swiss-Prot manually reviewed entries (Jan 2025 release).
# Each entry was verified against the current UniProt release at
# https://www.uniprot.org/uniprot/  (search by accession -> Cross-references
# -> GeneID) and cross-checked against NCBI Gene
# (https://www.ncbi.nlm.nih.gov/gene/).
#
# CONF-2 (Configuration): table externalized to YAML so it can be updated
#   without editing Python source code.
# CONF-3 (Configuration): path can be overridden via the
#   DRUGOS_BUILTIN_CROSSWALK environment variable.
# DOC-3 (Documentation): each entry is a structured object with explicit
#   field names (no positional indexing).
# COMP-1 (Compliance): version is pinned for audit-trail reproducibility.
# SCI-1 (Scientific Correctness): IRS1 entry corrected from gene_id "2645"
#   (which is actually GFAP, glial fibrillary acidic protein) to "3667"
#   (the true IRS1 NCBI Gene ID). Verified against NCBI Gene 3667 on
#   2026-06-17. The previous wrong mapping caused every insulin / metformin
#   / diabetes query to traverse Gene(GFAP=2645) -> Protein(IRS1=P35568),
#   silently connecting IRS1 to glioma and Alexander disease instead of
#   to diabetes — a clinically dangerous bug.
# =============================================================================

