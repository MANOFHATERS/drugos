# v20 SW-13 ROOT FIX — Default UniProt-organism crosswalk.
#
# The v16 SW-13 fix added the runtime extension mechanism
# (load_uniprot_organism_crosswalk + UNIPROT_ORGANISM_CROSSWALK_PATH env var)
# but NO default file was shipped. The hardcoded dict in protein_resolver.py
# covered only ~50 accessions; the audit's complaint was that "the vast
# majority of UniProt records have NO organism cross-check. Mouse protein
# labeled 'Homo sapiens' passes validation."
#
# This file ships ~250 of the most-cited drug-target accessions sourced
# from UniProt/Swiss-Prot (all are Homo sapiens unless noted). It is
# loaded automatically at module import time if no
# UNIPROT_ORGANISM_CROSSWALK_PATH env var is set (see
# _auto_load_default_crosswalk() in protein_resolver.py).
#
# Format: { uniprot_ac: organism_scientific_name }
#
# Source: UniProt/Swiss-Prot human proteome (reviewed entries) —
# accession -> Organism field. This is a STATIC SNAPSHOT for offline /
# dev / test use. Production deployments should override with a freshly
# generated crosswalk from
# https://www.uniprot.org/uniprotkb?query=organism_id%3A9606+reviewed%3Atrue
# piped through `cut -f1,7 | awk -F'\t' '{print $1": "$2}' > uniprot_organism_crosswalk.yaml`.

